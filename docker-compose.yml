version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: jianyong-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: jianyong
      MYSQL_DATABASE: jianyong_cnc
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jianyong-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 前端开发由 Vite dev server 直接在宿主机运行（HMR 更快）
  # 生产构建时用 nginx 或 CDN 部署

volumes:
  mysql_data:
  uploads:
